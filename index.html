<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRST Analyzer Pro v2.0 (SOAR Engine)</title>
    <style>
        :root {
            --bg-color: #1a1a1a; --text-color: #d4d4d4; --container-bg: #2d2d2d;
            --primary: #007acc; --border: #444; --high-risk: #ff4757;
            --med-risk: #ffa502; --low-risk: #eccc68; --safe: #2ed573;
        }
        body { font-family: 'Courier New', monospace; margin: 0; padding: 10px; background: var(--bg-color); color: var(--text-color); font-size: 12px; }
        .box { background: var(--container-bg); padding: 10px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; }
        textarea { width: 100%; background: #111; color: var(--text-color); border: 1px solid var(--border); padding: 8px; box-sizing: border-box; font-family: monospace; }
        #log-input { height: 100px; }
        #fixlist-output { height: 150px; color: #ffeb3b; }
        button { background: var(--primary); color: white; border: none; padding: 8px 12px; cursor: pointer; font-weight: bold; border-radius: 4px; margin-top: 5px; }
        button:hover { opacity: 0.8; }
        .btn-red { background: var(--high-risk); }
        .btn-green { background: var(--safe); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: left; }
        th { background: #222; }
        .score-100 { color: var(--high-risk); font-weight: bold; }
        .score-60 { color: var(--med-risk); font-weight: bold; }
        .score-20 { color: var(--low-risk); }

        .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 800px) { .split-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="box">
        <h2>🛠️ FRST Log Input (v2.0 Engine)</h2>
        <textarea id="log-input" placeholder="Paste your FRST.txt or Addition.txt log here..."></textarea>
        <button onclick="runForensicEngine()">⚡ Run Advanced Analysis</button>
    </div>

    <div class="split-grid">
        <div class="box" id="threat-summary-box" style="display:none;">
            <h3 style="margin-top:0;">🚨 Threat Intelligence Summary</h3>
            <div id="summary-stats" style="margin-bottom: 10px; font-size: 14px;"></div>
            <div style="overflow-x: auto; max-height: 300px;">
                <table id="threat-table">
                    <thead><tr><th>Score</th><th>Risk</th><th>Threat Type</th><th>Detected Line</th></tr></thead>
                    <tbody id="threat-tbody"></tbody>
                </table>
            </div>
        </div>

        <div class="box" id="fixlist-box" style="display:none;">
            <h3 style="margin-top:0;">📝 Auto-Generated Fixlist</h3>
            <p style="margin-top:0; font-size:10px; color:#aaa;">Ready to copy/paste into a fixlist.txt file.</p>
            <textarea id="fixlist-output" readonly></textarea>
            <button class="btn-green" onclick="copyFixlist()">📋 Copy Fixlist</button>
        </div>
    </div>

    <script>
        // --- 1. THE THREAT MATRIX (Confidence Scoring & Signatures) ---
        const threatMatrix = [
            // HIGH RISK (Score 90-100)
            { id: "md5_folder", regex: /\\AppData\\Local\\[a-f0-9]{32}\b/i, score: 100, risk: "High", type: "MD5 Hash Folder" },
            { id: "defender_disable", regex: /DisableAntiSpyware|DisableAntiVirus|TamperProtection: 0/i, score: 100, risk: "High", type: "Security Disabled" },
            { id: "encoded_ps", regex: /-EncodedCommand|-enc\s/i, score: 95, risk: "High", type: "Encoded PowerShell" },
            { id: "lolbin", regex: /\\(temp|appdata|programdata).*\\(pythonw|certutil|mshta|wmic)\.exe/i, score: 90, risk: "High", type: "LOLBin Abuse" },
            { id: "random_sys32", regex: /\\System32\\[a-f0-9-]{16,}\.exe/i, score: 90, risk: "High", type: "Randomized Sys32 Binary" },
            
            // MEDIUM RISK (Score 50-80)
            { id: "renpy", regex: /\\RenPy\\/i, score: 60, risk: "Medium", type: "RenPy Game Folder" },
            { id: "kms_hook", regex: /SppExtComObjHook\.dll|KMS/i, score: 70, risk: "Medium", type: "KMS Emulator / Hook" },
            { id: "orphaned_fw", regex: /FirewallRules:.*=> No File/i, score: 50, risk: "Medium", type: "Orphaned Firewall Rule" },
            
            // LOW RISK (Score 20-40)
            { id: "dead_task", regex: /Task:.*=> No File/i, score: 30, risk: "Low", type: "Dead Scheduled Task" },
            { id: "generic_attention", regex: /<==== ATTENTION/i, score: 40, risk: "Low", type: "FRST System Flag" }
        ];

        // Safe signatures to ignore
        const whitelist = ['microsoft corporation', 'nvidia corporation', 'valve', 'steamapps', 'google llc'];

        // --- 2. THE PARSER ENGINE ---
        function runForensicEngine() {
            const rawLog = document.getElementById('log-input').value;
            if (!rawLog) return alert("Please paste a log first.");

            const lines = rawLog.split('\n');
            let currentSection = "Unknown";
            let detectedThreats = [];

            // Read line by line
            for (let line of lines) {
                let cleanLine = line.trim();
                let lowerLine = cleanLine.toLowerCase();
                if (!cleanLine) continue;

                // Section Tracking
                if (cleanLine.startsWith("===============") && cleanLine.endsWith("===============")) {
                    currentSection = cleanLine.replace(/=/g, '').trim();
                    continue;
                }

                // Whitelist bypass
                if (whitelist.some(safe => lowerLine.includes(safe))) continue;

                // Matrix Matching
                let matched = false;
                for (let threat of threatMatrix) {
                    if (threat.regex.test(cleanLine)) {
                        detectedThreats.push({
                            section: currentSection,
                            line: cleanLine,
                            score: threat.score,
                            risk: threat.risk,
                            type: threat.type
                        });
                        matched = true;
                        break; // Stop checking other rules once highest risk is matched
                    }
                }
            }

            renderResults(detectedThreats);
        }

        // --- 3. FIXLIST GENERATOR & UI RENDERER ---
        function renderResults(threats) {
            // Sort by highest score first
            threats.sort((a, b) => b.score - a.score);

            const tbody = document.getElementById('threat-tbody');
            tbody.innerHTML = '';
            
            let high = 0, med = 0, low = 0;
            let fixlistCommands = [];

            threats.forEach(t => {
                // Tally stats
                if (t.risk === "High") high++;
                else if (t.risk === "Medium") med++;
                else low++;

                // Build Table Row
                let row = `<tr>
                    <td class="score-${t.score >= 90 ? '100' : t.score >= 50 ? '60' : '20'}">${t.score}</td>
                    <td>${t.risk}</td>
                    <td><b>${t.type}</b></td>
                    <td style="word-break: break-all;">${escapeHTML(t.line)}</td>
                </tr>`;
                tbody.innerHTML += row;

                // Build Fixlist Syntax
                fixlistCommands.push(generateFixCommand(t.line, t.section));
            });

            // Update UI
            document.getElementById('summary-stats').innerHTML = `
                <span style="color:var(--high-risk)"><b>High:</b> ${high}</span> | 
                <span style="color:var(--med-risk)"><b>Medium:</b> ${med}</span> | 
                <span style="color:var(--low-risk)"><b>Low:</b> ${low}</span>
            `;

            // Compile Fixlist output
            const finalFixlist = `Start::\nSystemRestore: On\nCreateRestorePoint:\nCloseProcesses:\n\n${fixlistCommands.join('\n')}\n\nEmptyTemp:\nHosts:\nReboot:\nEnd::`;
            document.getElementById('fixlist-output').value = finalFixlist;

            // Show boxes
            document.getElementById('threat-summary-box').style.display = 'block';
            document.getElementById('fixlist-box').style.display = 'block';
        }

        // Extracts the command logic based on the line structure
        function generateFixCommand(line, section) {
            let cmd = line;
            
            // Clean up FRST dates and ATTENTION tags
            cmd = cmd.replace(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2} - /, ''); 
            cmd = cmd.replace(/ <==== ATTENTION$/, '');

            // Specific Fix Formatting based on FRST rules
            if (line.includes("Task:")) {
                // Return exactly as written to delete task
                return cmd; 
            }
            if (line.includes("FirewallRules:")) {
                // Return exactly as written to delete rule
                return cmd; 
            }
            if (line.includes("HKLM\\") || line.includes("HKU\\") || line.includes("HKCU\\")) {
                // Registry keys
                return cmd;
            }
            
            // If it's just a raw path (like an MD5 folder in One Month Created)
            if (cmd.match(/^[a-zA-Z]:\\/)) {
                // If it ends without an extension, assume folder
                if (!cmd.includes('.')) return `Folder: ${cmd}`;
                return cmd; // File deletion
            }

            return cmd; // Fallback
        }

        function copyFixlist() {
            const output = document.getElementById('fixlist-output');
            output.select();
            document.execCommand('copy');
            alert("Fixlist copied to clipboard!");
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
