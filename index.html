<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRST Log Analyzer Workspace</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --container-bg: #2d2d2d;
            --primary-color: #007acc;
            --border-color: #444;
            --attention-color: #ff5555;
            --nofile-color: #00ff66;
            --yellow-flag: #ffff00;
            --orange-flag: #ff7700;
            --copied-bg: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 4px; 
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 11px; 
            padding-bottom: 80px;
        }

        .input-group {
            background: var(--container-bg);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        textarea#log-input {
            width: 100%;
            height: 80px;
            background: #111;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            box-sizing: border-box;
            border-radius: 4px;
            resize: vertical;
        }

        .file-input-wrapper {
            margin-top: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }

        .custom-file-upload {
            background: #444;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            border: 1px solid var(--border-color);
        }

        #utility-bar {
            display: none;
            background: var(--container-bg);
            padding: 6px;
            margin-bottom: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            flex-direction: column;
            gap: 6px;
        }
        
        .utility-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        #utility-bar select, #utility-bar input {
            flex: 1;
            background: #111;
            color: white;
            border: 1px solid var(--border-color);
            padding: 6px;
            border-radius: 4px;
            font-size: 11px;
            min-width: 0;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        button:active { opacity: 0.8; }
        .btn-block { width: 100%; margin-top: 10px; }

        #log-display {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 6px; 
            white-space: pre; 
            overflow-x: auto; 
            min-height: 60vh;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
            font-size: 11px; 
            line-height: 1.4;
            user-select: text;
        }

        #log-display div { 
            padding: 2px 4px; 
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background-color 0.2s, border-color 0.2s;
        }

        #log-display div:active {
            background-color: rgba(255,255,255,0.05);
        }

        .hl-attention { color: var(--attention-color) !important; font-weight: bold; }
        .hl-nofile { color: var(--nofile-color) !important; font-weight: bold; }
        .hl-yellow { color: var(--yellow-flag) !important; font-weight: bold; background-color: rgba(255, 255, 0, 0.08); }
        .hl-orange { color: var(--orange-flag) !important; font-weight: bold; background-color: rgba(255, 119, 0, 0.12); }
        .hl-copied { background-color: var(--copied-bg) !important; border-left: 3px solid var(--primary-color) !important; }

        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #111;
            padding: 10px;
            display: flex;
            gap: 6px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .footer-nav button { flex: 1; margin: 0; font-size: 13px; padding: 10px 4px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            width: 95%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            position: relative;
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            font-family: sans-serif;
        }

        input[type="text"], textarea.form-control {
            width: 100%;
            padding: 12px;
            background: var(--container-bg);
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        textarea.output-box {
            width: 100%;
            background: var(--container-bg);
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px;
            box-sizing: border-box;
            white-space: pre;
            overflow-x: auto;
            font-size: 11px;
            font-family: monospace;
        }

        .helper-section {
            border: 1px solid #444;
            background: #252525;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        .helper-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .helper-body {
            white-space: pre-wrap;
            background: #111;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            word-break: break-all;
            user-select: all;
        }
        .delete-btn { color: #ff5555; cursor: pointer; font-size: 12px; }
        
        .db-tag {
            display: inline-block;
            background: #444;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 4px;
            font-size: 11px;
        }
        .db-tag-orange { color: var(--orange-flag); border: 1px solid var(--orange-flag); }
        .db-tag-yellow { color: var(--yellow-flag); border: 1px solid var(--yellow-flag); }
        
        #toast {
            display: none;
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 300;
            font-size: 13px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="toast">Copied to clipboard!</div>

    <div class="input-group">
        <textarea id="log-input" placeholder="Paste FRST log here..."></textarea>
        <div class="file-input-wrapper">
            <label class="custom-file-upload">
                <input type="file" id="file-picker" accept=".txt" multiple onchange="handleFileUpload()">
                📁 Upload Logs
            </label>
            <span id="file-name" style="font-size:12px; color:#888;">No file selected</span>
        </div>
        <button class="btn-block" onclick="renderLog()">Process & Load Log</button>
    </div>

    <div id="utility-bar">
        <div class="utility-row">
            <select id="section-jumper" onchange="jumpToSection()">
                <option value="">-- Jump to Section --</option>
            </select>
        </div>
        <div class="utility-row">
            <input type="text" id="live-filter" placeholder="🔍 Filter log view..." oninput="filterLogView()">
        </div>
    </div>

    <div id="log-display">Log data will render here...</div>

    <div class="footer-nav">
        <button onclick="openModal('tools-modal')">🛠️ Tools</button>
        <button style="background-color: #e67e22;" onclick="openModal('fixlist-modal')">📝 View Fixlist</button>
        <button style="background-color: #2b8a3e;" onclick="openHelperModal()">📋 Helper GUI</button>
    </div>

    <div id="tools-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('tools-modal')">&times;</span>
            <h2>Tools Extraction</h2>
            <p>Type keywords to pull explicit telemetry matches manually.</p>
            <input type="text" id="tool-instruction" placeholder="e.g., ATTENTION or Task:">
            <button class="btn-block" onclick="processInstruction()">Extract Lines</button>
        </div>
    </div>

    <div id="results-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('results-modal')">&times;</span>
            <h2>Extracted Results</h2>
            <textarea id="results-area" class="output-box" style="height: 240px;" readonly></textarea>
            <button id="copy-btn" class="btn-block" onclick="copyResults('results-area', 'copy-btn')">Copy All</button>
        </div>
    </div>

    <div id="fixlist-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('fixlist-modal')">&times;</span>
            <h2>Fixlist Workspace</h2>
            <textarea id="fixlist-area" class="output-box" style="height: 240px;">Start::
SystemRestore: On
CreateRestorePoint:
CloseProcesses:

EmptyTemp:
Hosts:
End::</textarea>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="copy-fix-btn" style="flex: 1; background-color:#e67e22;" onclick="copyResults('fixlist-area', 'copy-fix-btn')">Copy</button>
                <button style="flex: 1; background-color:#2980b9;" onclick="downloadFixlist()">💾 Save .txt</button>
            </div>
            
            <button class="btn-block" style="background-color:#555; margin-top:10px;" onclick="clearFixlist()">Reset Template</button>
        </div>
    </div>

    <div id="helper-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('helper-modal')">&times;</span>
            
            <h2>Process Manual Query</h2>
            <div style="border: 1px dashed var(--primary-color); padding: 10px; margin-bottom: 20px; border-radius:4px;">
                <label><b>Search Entry:</b></label>
                <input type="text" id="lookup-filename-input" placeholder="e.g., badfile.sys or svchost.exe">
                <button class="btn-block" style="background-color: var(--primary-color);" onclick="runManualSearchQuery()">Search Web Entry</button>
            </div>

            <h2>Flagging Databases</h2>
            <div style="border: 1px dashed #666; padding: 10px; margin-bottom: 20px; border-radius:4px;">
                <label><b>Enter Path, Keyword, or Regex:</b></label>
                <input type="text" id="db-keyword-input" placeholder="e.g., AppData\Local\RenPy">
                
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <button style="flex:1; background-color: #f39c12; font-size:13px; padding:10px;" onclick="saveDatabaseKeyword('yellow')">Flag Yellow</button>
                    <button style="flex:1; background-color: #d35400; font-size:13px; padding:10px;" onclick="saveDatabaseKeyword('orange')">Flag Orange 🌟</button>
                </div>
                
                <div id="db-keywords-holder" style="margin-top:15px;"></div>
            </div>

            <h2>Helper Notes Storage</h2>
            <div style="border: 1px dashed #555; padding: 10px; margin-bottom: 15px; border-radius:4px;">
                <label><b>Section Title:</b></label>
                <input type="text" id="helper-input-section" placeholder="e.g., Extra Commands">
                <label><b>Saved Content:</b></label>
                <textarea id="helper-input-text" class="form-control" style="height:70px;" placeholder="Paste text here..."></textarea>
                <button class="btn-block" onclick="saveHelperEntry()">Save Snippet Entry</button>
            </div>

            <h3>Your Saved Sections</h3>
            <div id="helper-saved-list"></div>
        </div>
    </div>

    <script>
        let currentLogLines = [];
        const initialFixlistTemplate = `Start::\nSystemRestore: On\nCreateRestorePoint:\nCloseProcesses:\n\nEmptyTemp:\nHosts:\nEnd::`;

        const frstSections = ["processes", "registry", "scheduled tasks", "internet", "services", "drivers", "netsvcs", "one month (created)", "one month (modified)", "files in root", "sigcheck"];
        const additionSections = ["accounts", "security center", "installed programs", "packages", "custom clsid", "codecs", "shortcuts & wmi", "loaded modules", "alternate data streams", "safe mode", "association", "internet explorer", "hosts content", "network", "other areas", "msconfig", "firewallrules", "restore points", "faulty device manager", "event log errors", "memory info", "drives", "mbr & partition table"];

        function safeGetStorage(key, defaultVal) {
            try {
                let item = localStorage.getItem(key);
                if (!item) return defaultVal;
                let parsed = JSON.parse(item);
                return Array.isArray(parsed) ? parsed.filter(t => typeof t === 'string') : defaultVal;
            } catch (e) { 
                return defaultVal; 
            }
        }
        
        function safeSetStorage(key, val) {
            try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { console.warn("Storage restricted."); }
        }

        async function handleFileUpload() {
            const fileInput = document.getElementById('file-picker');
            const fileNameDisplay = document.getElementById('file-name');
            if (fileInput.files.length === 0) return;
            
            let fileNames = [];
            let combinedContent = "";

            for (let i = 0; i < fileInput.files.length; i++) {
                let file = fileInput.files[i];
                fileNames.push(file.name);
                let text = await file.text();
                if(i > 0) combinedContent += `\n==================== End of Previous Log ====================\n\n`;
                combinedContent += text + "\n";
            }

            fileNameDisplay.innerText = fileNames.join(', ');
            document.getElementById('log-input').value = combinedContent;
            renderLog();
        }

        function renderLog() {
            const rawText = document.getElementById('log-input').value;
            if (!rawText) return;
            
            currentLogLines = rawText.split('\n');
            const displayEl = document.getElementById('log-display');
            
            const jumper = document.getElementById('section-jumper');
            jumper.innerHTML = '<option value="">-- Jump to Section --</option>';

            const frstGroup = document.createElement('optgroup');
            frstGroup.label = "─── FRST.txt Sections ───";
            const additionGroup = document.createElement('optgroup');
            additionGroup.label = "─── Addition.txt Sections ───";

            let yellowDb = safeGetStorage('frst_yellow_db', []);
            let orangeDb = safeGetStorage('frst_orange_db', []);

            let htmlBuilder = [];

            currentLogLines.forEach((line, index) => {
                let classes = [];
                
                if (line.startsWith('====================') && line.trim().endsWith('====================')) {
                    const cleanTitle = line.replace(/=/g, '').trim();
                    const lowerTitle = cleanTitle.toLowerCase();
                    const opt = document.createElement('option');
                    opt.value = `log-L${index}`;
                    opt.textContent = cleanTitle;

                    if (frstSections.some(sec => lowerTitle.includes(sec))) frstGroup.appendChild(opt);
                    else if (additionSections.some(sec => lowerTitle.includes(sec))) additionGroup.appendChild(opt);
                    else frstGroup.appendChild(opt);
                }

                let lowerLine = line.toLowerCase();
                
                if (line.includes('ATTENTION')) classes.push('hl-attention');
                else if (line.includes('No File')) classes.push('hl-nofile');
                else if (orangeDb.length > 0 && orangeDb.some(term => term && lowerLine.includes(term.toLowerCase()))) classes.push('hl-orange');
                else if (yellowDb.length > 0 && yellowDb.some(term => term && lowerLine.includes(term.toLowerCase()))) classes.push('hl-yellow');

                let safeLine = escapeHTML(line);
                let classAttr = classes.length > 0 ? ` class="${classes.join(' ')}"` : '';
                
                htmlBuilder.push(`<div id="log-L${index}"${classAttr}>${safeLine || '&nbsp;'}</div>`);
            });
            
            if (frstGroup.children.length > 0) jumper.appendChild(frstGroup);
            if (additionGroup.children.length > 0) jumper.appendChild(additionGroup);

            displayEl.innerHTML = htmlBuilder.join('');
            document.querySelector('.input-group').style.display = 'none'; 
            document.getElementById('utility-bar').style.display = 'flex';
        }

        function runManualSearchQuery() {
            const inputEl = document.getElementById('lookup-filename-input');
            const targetEntry = inputEl.value.trim();
            if(!targetEntry) return;

            const targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(targetEntry);
            window.open(targetUrl, '_blank');
        }

        const logDisplay = document.getElementById('log-display');
        logDisplay.addEventListener('click', function(e) {
            let targetDiv = e.target.closest('div[id^="log-L"]');
            if (!targetDiv) return;
            
            let idx = parseInt(targetDiv.id.replace('log-L', ''));
            if(idx >= 0 && idx < currentLogLines.length) {
                let rawText = currentLogLines[idx];
                navigator.clipboard.writeText(rawText).then(() => {
                    targetDiv.classList.add('hl-copied');
                    const toast = document.getElementById('toast');
                    toast.style.display = 'block';
                    setTimeout(() => { toast.style.display = 'none'; }, 1000);
                });
            }
