<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRST Log Analyzer Pro</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --container-bg: #2d2d2d;
            --primary-color: #007acc;
            --border-color: #444;
            --attention-color: #ff5555;
            --nofile-color: #00ff66;
            --purple-num: #b55fe6;
            --yellow-flag: #ffff00;
            --orange-flag: #ff7700; /* Orange for malicious database items */
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 4px; 
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 11px; 
            padding-bottom: 80px;
        }

        .input-group {
            background: var(--container-bg);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        textarea#log-input {
            width: 100%;
            height: 80px;
            background: #111;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            box-sizing: border-box;
            border-radius: 4px;
            resize: vertical;
        }

        .file-input-wrapper {
            margin-top: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }

        .custom-file-upload {
            background: #444;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            border: 1px solid var(--border-color);
        }

        #utility-bar {
            display: none;
            background: var(--container-bg);
            padding: 6px;
            margin-bottom: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            gap: 8px;
        }
        #utility-bar select, #utility-bar input {
            flex: 1;
            background: #111;
            color: white;
            border: 1px solid var(--border-color);
            padding: 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        button:active { opacity: 0.8; }
        .btn-block { width: 100%; margin-top: 10px; }

        #log-display {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 6px; 
            white-space: pre; 
            overflow-x: auto; 
            min-height: 60vh;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
            font-size: 11px; 
            line-height: 1.4;
        }

        #log-display div { padding: 2px 0; }

        .line-num {
            color: var(--purple-num);
            font-weight: bold;
            cursor: pointer;
            margin-left: 12px;
            display: inline-block;
            user-select: none;
            padding: 0 4px;
        }
        .line-num:active { background: #444; border-radius: 3px; }

        /* Highlight Rules */
        .hl-attention { color: var(--attention-color); font-weight: bold; }
        .hl-nofile { color: var(--nofile-color); font-weight: bold; }
        .hl-yellow { color: var(--yellow-flag); font-weight: bold; background-color: rgba(255, 255, 0, 0.08); }
        .hl-orange { color: var(--orange-flag); font-weight: bold; background-color: rgba(255, 119, 0, 0.12); }

        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #111;
            padding: 10px;
            display: flex;
            gap: 6px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .footer-nav button { flex: 1; margin: 0; font-size: 13px; padding: 10px 4px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            width: 95%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            position: relative;
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            font-family: sans-serif;
        }

        input[type="text"], textarea.form-control {
            width: 100%;
            padding: 12px;
            background: var(--container-bg);
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        textarea.output-box {
            width: 100%;
            height: 240px;
            background: var(--container-bg);
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px;
            box-sizing: border-box;
            white-space: pre;
            overflow-x: auto;
            font-size: 11px;
        }

        .helper-section {
            border: 1px solid #444;
            background: #252525;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        .helper-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .helper-body {
            white-space: pre-wrap;
            background: #111;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            word-break: break-all;
            user-select: all;
        }
        .delete-btn { color: #ff5555; cursor: pointer; font-size: 12px; }
        
        #toast {
            display: none;
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--purple-num);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 300;
            font-size: 12px;
        }
        .db-tag {
            display: inline-block;
            background: #444;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 4px;
            font-size: 11px;
        }
        .db-tag-orange { color: var(--orange-flag); border: 1px solid var(--orange-flag); }
        .db-tag-yellow { color: var(--yellow-flag); border: 1px solid var(--yellow-flag); }
    </style>
</head>
<body>

    <div id="toast">Added to Fixlist</div>

    <div class="input-group">
        <textarea id="log-input" placeholder="Paste FRST log here..."></textarea>
        <div class="file-input-wrapper">
            <label class="custom-file-upload">
                <input type="file" id="file-picker" accept=".txt" onchange="handleFileUpload()">
                📁 Upload .txt Log
            </label>
            <span id="file-name" style="font-size:12px; color:#888;">No file selected</span>
        </div>
        <button class="btn-block" onclick="renderLog()">Process & Load Log</button>
    </div>

    <div id="utility-bar">
        <select id="section-jumper" onchange="jumpToSection()">
            <option value="">-- Jump to Section --</option>
        </select>
        <input type="text" id="live-filter" placeholder="🔍 Filter log view..." oninput="filterLogView()">
    </div>

    <div id="log-display">Log data will render here...</div>

    <div class="footer-nav">
        <button onclick="openModal('tools-modal')">🛠️ Tools</button>
        <button style="background-color: #e67e22;" onclick="openModal('fixlist-modal')">📝 View Fixlist</button>
        <button style="background-color: #2b8a3e;" onclick="openHelperModal()">📋 Helper GUI</button>
    </div>

    <div id="tools-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('tools-modal')">&times;</span>
            <h2>Tools Extraction</h2>
            <p>Type exactly <b>No File</b> or <b>ATTENTION</b> to grab matching lines.</p>
            <input type="text" id="tool-instruction" placeholder="No File / ATTENTION">
            <button class="btn-block" onclick="processInstruction()">Extract Lines</button>
        </div>
    </div>

    <div id="results-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('results-modal')">&times;</span>
            <h2>Extracted Results</h2>
            <textarea id="results-area" class="output-box" readonly></textarea>
            <button id="copy-btn" class="btn-block" onclick="copyResults('results-area', 'copy-btn')">Copy All</button>
        </div>
    </div>

    <div id="fixlist-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('fixlist-modal')">&times;</span>
            <h2>Fixlist</h2>
            <textarea id="fixlist-area" class="output-box">Start::
SystemRestore: On
CreateRestorePoint:
CloseProcesses:


---

EmptyTemp:
Hosts:
End::</textarea>
            <button id="copy-fix-btn" class="btn-block" style="background-color:#e67e22;" onclick="copyResults('fixlist-area', 'copy-fix-btn')">Copy All</button>
            <button class="btn-block" style="background-color:#555; margin-top:5px;" onclick="clearFixlist()">Reset Template</button>
        </div>
    </div>

    <div id="helper-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('helper-modal')">&times;</span>
            
            <h2>Flagging Databases</h2>
            <div style="border: 1px dashed #666; padding: 10px; margin-bottom: 20px; border-radius:4px;">
                <label><b>Enter Target Path / Keyword:</b></label>
                <input type="text" id="db-keyword-input" placeholder="e.g., AppData\Local\RenPy">
                
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <button style="flex:1; background-color: #f39c12; font-size:13px; padding:10px;" onclick="saveDatabaseKeyword('yellow')">Flag Yellow</button>
                    <button style="flex:1; background-color: #d35400; font-size:13px; padding:10px;" onclick="saveDatabaseKeyword('orange')">Flag Orange 🌟</button>
                </div>
                
                <div id="db-keywords-holder" style="margin-top:15px;"></div>
            </div>

            <h2>Helper Notes Storage</h2>
            <div style="border: 1px dashed #555; padding: 10px; margin-bottom: 15px; border-radius:4px;">
                <label><b>Section Title:</b></label>
                <input type="text" id="helper-input-section" placeholder="e.g., Extra Commands">
                <label><b>Saved Content:</b></label>
                <textarea id="helper-input-text" class="form-control" style="height:70px;" placeholder="Paste text here..."></textarea>
                <button class="btn-block" onclick="saveHelperEntry()">Save & Permanent Add</button>
            </div>

            <h3>Your Saved Sections</h3>
            <div id="helper-saved-list"></div>
        </div>
    </div>

    <script>
        let currentLogLines = [];
        const initialFixlistTemplate = `Start::\nSystemRestore: On\nCreateRestorePoint:\nCloseProcesses:\n\n\n---\n\nEmptyTemp:\nHosts:\nEnd::`;

        function safeGetStorage(key, defaultVal) {
            try { return JSON.parse(localStorage.getItem(key)) || defaultVal; } 
            catch (e) { return defaultVal; }
        }
        function safeSetStorage(key, val) {
            try { localStorage.setItem(key, JSON.stringify(val)); } 
            catch (e) { console.warn("Storage restricted."); }
        }

        function handleFileUpload() {
            const fileInput = document.getElementById('file-picker');
            const fileNameDisplay = document.getElementById('file-name');
            if (fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            fileNameDisplay.innerText = file.name;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('log-input').value = e.target.result;
                renderLog();
            };
            reader.readAsText(file);
        }

        // Smart Logic Engine: Strips FRST preamble timestamps, attributes, and trailing brackets
        function extractFrstCorePath(line) {
            let cleaned = line.trim();

            // 1. Strip double timestamps + sizes + attributes (e.g., "2026-05-25 12:00 - 2026-05-25 12:01 - 000123456 ____A C:\path")
            cleaned = cleaned.replace(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2} - \d{4}-\d{2}-\d{2} \d{2}:\d{2} - \d+ [_\w\-]{5}\s?([A-Z]:\\)/i, '$1');
            cleaned = cleaned.replace(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2} - \d{4}-\d{2}-\d{2} \d{2}:\d{2} - \d+ [_\w\-]{5}\s+/, '');

            // 2. Strip single timestamps + sizes + attributes (e.g., "2026-05-25 12:00 - 000123456 ____A C:\path")
            cleaned = cleaned.replace(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2} - \d+ [_\w\-]{5}\s?([A-Z]:\\)/i, '$1');
            cleaned = cleaned.replace(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2} - \d+ [_\w\-]{5}\s+/, '');

            // 3. Strip basic lone timestamps from registry/services lines (e.g., "2026-05-25 12:00 - RunKey")
            cleaned = cleaned.replace(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2} - \s*/, '');

            // 4. Strip trailing system brackets completely (e.g., "[12345 2026-05-25]", "[12345]", or MD5/SHA hashes in brackets)
            cleaned = cleaned.replace(/\s*\[\d+\s+\d{4}-\d{2}-\d{2}\]$/, '');
            cleaned = cleaned.replace(/\s*\[\d+\]$/, '');
            cleaned = cleaned.replace(/\s*\[[A-Fa-f0-9]{32,64}\]$/, '');

            return cleaned;
        }

        function renderLog() {
            const rawText = document.getElementById('log-input').value;
            if (!rawText) return;
            
            currentLogLines = rawText.split('\n');
            const displayEl = document.getElementById('log-display');
            displayEl.innerHTML = ''; 
            
            const jumper = document.getElementById('section-jumper');
            jumper.innerHTML = '<option value="">-- Jump to Section --</option>';

            const yellowDB = safeGetStorage('frst_yellow_db', []);
            const orangeDB = safeGetStorage('frst_orange_db', []);
            const fragment = document.createDocumentFragment();

            currentLogLines.forEach((line, index) => {
                const lineEl = document.createElement('div');
                lineEl.id = `log-L${index}`;
                
                if (line.startsWith('====================') && line.trim().endsWith('====================')) {
                    const cleanTitle = line.replace(/=/g, '').trim();
                    const opt = document.createElement('option');
                    opt.value = `log-L${index}`;
                    opt.textContent = cleanTitle;
                    jumper.appendChild(opt);
                }

                let safeLine = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                let matchesOrange = orangeDB.some(keyword => line.toLowerCase().includes(keyword.toLowerCase()));
                let matchesYellow = yellowDB.some(keyword => line.toLowerCase().includes(keyword.toLowerCase()));

                if (matchesOrange && line.trim() !== '') {
                    lineEl.className = 'hl-orange';
                } else if (matchesYellow && line.trim() !== '') {
                    lineEl.className = 'hl-yellow';
                } else if (safeLine.includes('ATTENTION')) {
                    lineEl.className = 'hl-attention';
                } else if (safeLine.includes('No File')) {
                    lineEl.className = 'hl-nofile';
                }

                lineEl.innerHTML = safeLine || '&nbsp;';
                
                const numSpan = document.createElement('span');
                numSpan.className = 'line-num';
                numSpan.textContent = `[${index + 1}]`;
                numSpan.onclick = function(e) {
                    e.stopPropagation();
                    // Extract only the path/task payload before moving to fixlist
                    let corePayload = extractFrstCorePath(line);
                    appendLineToFixlist(corePayload);
                };

                lineEl.appendChild(numSpan);
                fragment.appendChild(lineEl);
            });
            
            displayEl.appendChild(fragment);
            document.querySelector('.input-group').style.display = 'none'; 
            document.getElementById('utility-bar').style.display = 'flex';
        }

        function jumpToSection() {
            const targetId = document.getElementById('section-jumper').value;
            if (!targetId) return;
            const targetEl = document.getElementById(targetId);
            if (targetEl) {
                targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function filterLogView() {
            const query = document.getElementById('live-filter').value.toLowerCase();
            const logContainer = document.getElementById('log-display');
            const lines = logContainer.getElementsByTagName('div');

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].textContent.toLowerCase().includes(query)) {
                    lines[i].style.display = '';
                } else {
                    lines[i].style.display = 'none';
                }
            }
        }

        function appendLineToFixlist(cleanedLine) {
            if(!cleanedLine.trim()) return;
            const fixArea = document.getElementById('fixlist-area');
            let currentText = fixArea.value;

            if (currentText.includes('---')) {
                currentText = currentText.replace('---', cleanedLine.trim() + '\n---');
            } else if (currentText.includes('End::')) {
                currentText = currentText.replace('End::', cleanedLine.trim() + '\nEnd::');
            } else {
                currentText += '\n' + cleanedLine.trim();
            }
            fixArea.value = currentText;

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1000);
        }

        function clearFixlist() {
            if(confirm("Reset fixlist container workspace back to default template layout?")) {
                document.getElementById('fixlist-area').value = initialFixlistTemplate;
            }
        }

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if(id === 'tools-modal') document.getElementById('tool-instruction').focus();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function processInstruction() {
            const instruction = document.getElementById('tool-instruction').value.trim();
            if (!instruction) return;
            
            let extractedLines = [];
            for (let line of currentLogLines) {
                if (line.includes(instruction)) {
                    extractedLines.push(line);
                }
            }

            document.getElementById('results-area').value = extractedLines.join('\n');
            closeModal('tools-modal');
            openModal('results-modal');
            document.getElementById('copy-btn').innerText = 'Copy All';
        }

        function copyResults(textareaId, buttonId) {
            const resultsArea = document.getElementById(textareaId);
            resultsArea.select();
            resultsArea.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(resultsArea.value).then(() => {
                document.getElementById(buttonId).innerText = 'Copied!';
            });
        }

        function openHelperModal() {
            loadHelperEntries();
            renderDatabaseKeywords();
            openModal('helper-modal');
        }

        function saveDatabaseKeyword(color) {
            const inputEl = document.getElementById('db-keyword-input');
            const keyword = inputEl.value.trim();
            if(!keyword) return;

            let storageKey = color === 'orange' ? 'frst_orange_db' : 'frst_yellow_db';
            let db = safeGetStorage(storageKey, []);
            
            if(!db.includes(keyword)) {
                db.push(keyword);
                safeSetStorage(storageKey, db);
            }
            inputEl.value = '';
            renderDatabaseKeywords();
        }

        function renderDatabaseKeywords() {
            const holder = document.getElementById('db-keywords-holder');
            let yellowDb = safeGetStorage('frst_yellow_db', []);
            let orangeDb = safeGetStorage('frst_orange_db', []);
            
            if(yellowDb.length === 0 && orangeDb.length === 0) {
                holder.innerHTML = '<p style="font-size:11px; color:#666; margin:0;">Databases are currently empty.</p>';
                return;
            }
            
            let html = '';
            yellowDb.forEach((keyword, idx) => {
                html += `<span class="db-tag db-tag-yellow">${escapeHTML(keyword)} <b style="color:red; cursor:pointer; margin-left:6px;" onclick="deleteDatabaseKeyword('yellow', ${idx})">&times;</b></span>`;
            });
            orangeDb.forEach((keyword, idx) => {
                html += `<span class="db-tag db-tag-orange">${escapeHTML(keyword)} <b style="color:red; cursor:pointer; margin-left:6px;" onclick="deleteDatabaseKeyword('orange', ${idx})">&times;</b></span>`;
            });
            holder.innerHTML = html;
        }

        function deleteDatabaseKeyword(color, index) {
            let storageKey = color === 'orange' ? 'frst_orange_db' : 'frst_yellow_db';
            let db = safeGetStorage(storageKey, []);
            db.splice(index, 1);
            safeSetStorage(storageKey, db);
            renderDatabaseKeywords();
        }

        function saveHelperEntry() {
            const sectionTitle = document.getElementById('helper-input-section').value.trim() || 'General Snippet';
            const textValue = document.getElementById('helper-input-text').value.trim();

            if (!textValue) return;

            let items = safeGetStorage('frst_helper_items', []);
            items.push({ id: Date.now(), section: sectionTitle, content: textValue });
            safeSetStorage('frst_helper_items', items);
            
            document.getElementById('helper-input-section').value = '';
            document.getElementById('helper-input-text').value = '';
            loadHelperEntries();
        }

        function loadHelperEntries() {
            const displayBox = document.getElementById('helper-saved-list');
            let items = safeGetStorage('frst_helper_items', []);
            
            if(items.length === 0) {
                displayBox.innerHTML = '<p style="color:#666; font-style:italic;">No saved snippets yet.</p>';
                return;
            }

            let html = '';
            items.forEach(item => {
                html += `
                    <div class="helper-section">
                        <div class="helper-title">
                            <span>📂 ${escapeHTML(item.section)}</span>
                            <span class="delete-btn" onclick="deleteHelperEntry(${item.id})">❌ Delete</span>
                        </div>
                        <div class="helper-body" onclick="document.execCommand('copy')">${escapeHTML(item.content)}</div>
                    </div>
                `;
            });
            displayBox.innerHTML = html;
        }

        function deleteHelperEntry(id) {
            let items = safeGetStorage('frst_helper_items', []);
            items = items.filter(item => item.id !== id);
            safeSetStorage('frst_helper_items', items);
            loadHelperEntries();
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
