<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRST Log Reset Parser</title>
    <style>
        body { font-family: monospace; background: #111; color: #fff; padding: 15px; }
        textarea { width: 100%; background: #000; color: #2ed573; border: 1px solid #333; padding: 10px; box-sizing: border-box; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 10px; margin-bottom: 20px; }
        .output-box { background: #1a1a1a; border: 1px solid #444; padding: 10px; white-space: pre; overflow-x: auto; min-height: 200px; color: #ffb142; }
    </style>
</head>
<body>

    <h3>1. Paste Raw FRST Log Data</h3>
    <textarea id="log-input" rows="8" placeholder="Paste FRST or Addition logs here..."></textarea>
    
    <br>
    <button onclick="executeTargetedParse()">⚡ Parse Log Entries</button>

    <h3>2. Found Indicators List</h3>
    <div id="hits-output" class="output-box">No logs parsed yet.</div>

    <h3>3. Auto-Generated Fixlist Syntax</h3>
    <textarea id="fixlist-output" rows="10" placeholder="Fixlist commands will output here..."></textarea>

    <script>
        function executeTargetedParse() {
            const rawText = document.getElementById('log-input').value;
            if (!rawText) return alert("Please paste log data first.");

            const lines = rawText.split('\n');
            let detectedLines = [];
            let fixlistCommands = [];

            // Targeted Target Pattern Definitions
            const regexHashFolder = /\\AppData\\(Local|Roaming)\\[a-f0-9]{32}\b/i;
            const regexScriptsInAppData = /\\AppData\\.*\.(ps1|vbs|bat|cmd)\b/i;

            for (let line of lines) {
                let cleanLine = line.trim();
                let lowerLine = cleanLine.toLowerCase();
                if (!cleanLine) continue;

                // CONSTRAINT: Completely ignore entries containing "No File"
                if (lowerLine.includes("=> no file") || lowerLine.includes("(no file)")) {
                    continue;
                }

                let isMatch = false;

                // 1. Check for explicit ATTENTION flags
                if (cleanLine.includes("<==== ATTENTION")) {
                    isMatch = true;
                }
                // 2. Check for random hash naming directories in AppData
                else if (regexHashFolder.test(cleanLine)) {
                    isMatch = true;
                }
                // 3. Check for scripts (.ps1, .vbs, .bat, .cmd) dropped inside AppData locations
                else if (regexScriptsInAppData.test(cleanLine)) {
                    isMatch = true;
                }

                if (isMatch) {
                    detectedLines.push(cleanLine);

                    // Compile directly to clean FRST deletion commands
                    let cmd = cleanLine.replace(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2} - /, '');
                    cmd = cmd.replace(/ <==== ATTENTION$/, '');
                    if (cmd.match(/^____[A-Z\s\(\)]+\s/)) {
                        cmd = cmd.replace(/^____[A-Z\s\(\)]+\s/, '');
                    }
                    cmd = cmd.replace(/\s\[\d+.*\].*$/, '');

                    if (cmd.match(/^[a-zA-Z]:\\/) && !cmd.includes('.')) {
                        cmd = `Folder: ${cmd}`;
                    }

                    if (!fixlistCommands.includes(cmd) && !cmd.startsWith('=====')) {
                        fixlistCommands.push(cmd);
                    }
                }
            }

            // Print output directly as a flat text list
            const hitsContainer = document.getElementById('hits-output');
            if (detectedLines.length === 0) {
                hitsContainer.textContent = "Clean scan: No target indicators matched the current definitions rule set.";
            } else {
                hitsContainer.textContent = detectedLines.join('\n');
            }

            // Print flat structural script syntax
            document.getElementById('fixlist-output').value = `Start::\nSystemRestore: On\nCreateRestorePoint:\nCloseProcesses:\n\n${fixlistCommands.join('\n')}\n\nEmptyTemp:\nHosts:\nEnd::`;
        }
    </script>
</body>
</html>
